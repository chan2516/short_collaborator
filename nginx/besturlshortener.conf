# Nginx reverse proxy for Best URL Shortener
# Place in: /etc/nginx/sites-available/besturlshortener.conf
# Enable:   sudo ln -s /etc/nginx/sites-available/besturlshortener.conf /etc/nginx/sites-enabled/

upstream url_shortener_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name besturlshortener.com www.besturlshortener.com;

    # Increase if you shorten very long URLs
    client_max_body_size 1m;

    access_log /var/log/nginx/besturlshortener.access.log;
    error_log  /var/log/nginx/besturlshortener.error.log;

    location / {
        proxy_pass http://url_shortener_backend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }
}
