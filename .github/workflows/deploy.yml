name: Deploy to Ubuntu VM

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []   # runs in parallel; ci.yml also runs on push

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn clean package -DskipTests -B

      - name: Copy JAR to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "target/url-shortener-1.0.0.jar,deploy/deploy.sh"
          target: "/tmp/url-shortener-deploy"
          strip_components: 0

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo cp /tmp/url-shortener-deploy/deploy/deploy.sh /opt/url-shortener/deploy/deploy.sh
            sudo chmod +x /opt/url-shortener/deploy/deploy.sh
            sudo /opt/url-shortener/deploy/deploy.sh /tmp/url-shortener-deploy/target/url-shortener-1.0.0.jar
