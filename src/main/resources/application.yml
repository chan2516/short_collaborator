server:
  port: 8080
  forward-headers-strategy: framework

spring:
  application:
    name: best-url-shortener
  datasource:
    url: jdbc:h2:file:./data/urlshortener;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

app:
  base-url: http://besturlshortener.com

logging:
  level:
    com.besturlshortener: INFO
