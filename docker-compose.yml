services:
  url-shortener:
    build: .
    ports:
      - "8080:8080"
    environment:
      APP_BASE_URL: http://besturlshortener.com
      SPRING_PROFILES_ACTIVE: default
    volumes:
      - shortener-data:/app/data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/besturlshortener-docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - url-shortener
    restart: unless-stopped

volumes:
  shortener-data:
